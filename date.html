<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Date ❤️</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffd1dc, #ffe6f0);
        font-family: Arial, sans-serif;
      }

      .container {
        background: white;
        padding: 40px;
        width: 400px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      h1 {
        color: #ff4d88;
        margin-bottom: 10px;
      }

      h2 {
        color: #666;
        font-weight: normal;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 25px;
        text-align: left;
      }

      label {
        display: block;
        margin-bottom: 10px;
        color: #444;
        font-size: 18px;
      }

      input {
        width: 100%;
        padding: 15px;
        border: 2px solid #ffd1dc;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #ff4d88;
      }

      button {
        background: #ff4d88;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: #ff2d73;
        transform: scale(1.05);
      }

      .food-container {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 30px;
      }

      .card {
        width: 220px;
        background: #fff7fa;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
      }

      .card h3 {
        margin: 15px 0;
      }

      .card button {
        margin-bottom: 20px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background: #ff4d88;
        color: white;
        cursor: pointer;
        font-size: 16px;
      }

      .card button:hover {
        background: #ff2d73;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>YAY!! ❤️🥰</h1>
      <h2>Pick our date and time 🌹✨</h2>

      <div class="input-group">
        <label for="datePicker">📅 Date</label>
        <input type="date" id="datePicker" />
      </div>

      <div class="input-group">
        <label for="timePicker">⏰ Time</label>
        <input type="time" id="timePicker" />
      </div>

      <button onclick="confirmDate()">Confirm ❤️</button>
    </div>

    <script>
      function confirmDate() {
        const date = document.getElementById("datePicker").value;
        const time = document.getElementById("timePicker").value;

        if (!date || !time) {
          alert("Please choose both a date and time 😊");
          return;
        }

        localStorage.setItem("date", date);
        localStorage.setItem("time", time);

        document.querySelector(".container").innerHTML = `
    <h1>What should we eat? ❤️</h1>
    <h2>Pick your favorite 🥰</h2>

    <div class="food-container">

    <div class="card">
    <img src="images/img1.jpg" alt="Hấp thủy">
    <h3>Hấp thủy 🍣</h3>
    <button onclick="chooseFood('Hấp thủy 🍣')">
        Choose
    </button>
</div>

    <div class="card">
        <img src="images/img2.jpg" alt="Pizza">
        <h3>Pizza 🍕</h3>
        <button onclick="chooseFood('Pizza 🍕')">
    Choose
</button>
    </div>

    <div class="card">
        <img src="images/img3.jpg" alt="Beefsteak">
        <h3>Beefsteak 🍜</h3>
        <button onclick="chooseFood('Beefsteak 🥩')">
    Choose
</button>
    </div>

</div>
`;
      }

      function chooseFood(food) {
        localStorage.setItem("food", food);

        window.location.href = "activity.html";
      }
    </script>
  </body>
</html>
