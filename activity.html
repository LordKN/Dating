<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick an Activity ❤️</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffd1dc, #ffe6f0);
        font-family: Arial, sans-serif;
      }

      .container {
        text-align: center;
      }

      .food-container {
        display: flex;
        gap: 30px;
        margin-top: 30px;
        justify-content: center;
      }

      .card {
        width: 220px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-10px);
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }

      .card h3 {
        margin: 15px 0;
      }

      .card button {
        margin-bottom: 20px;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: #ff4d88;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>What should we do after eating? ❤️</h1>

      <div class="food-container">
        <div class="card">
          <img src="images/movie.jpg" alt="Movie" />
          <h3>🎬 Movie</h3>
          <button onclick="chooseActivity('Movie 🎬')">Choose</button>
        </div>

        <div class="card">
          <img src="images/cafe.jpg" alt="Cafe" />
          <h3>☕ Cafe</h3>
          <button onclick="chooseActivity('Cafe ☕')">Choose</button>
        </div>

        <div class="card">
          <img src="images/ptb.jpg" alt="Photobooth" />
          <h3>📸 Photobooth</h3>
          <button onclick="chooseActivity('Photobooth 📸')">Choose</button>
        </div>
      </div>
    </div>

    <script>
      function chooseActivity(activity) {
        localStorage.setItem("activity", activity);

        window.location.href = "summary.html";
      }
    </script>
  </body>
</html>
